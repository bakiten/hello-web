<!DOCTYPE html>
<html>
  <style>
.banner {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
}
    
h1 {
    text-align: center;
}

h2 {
    text-align: center;
}

.task-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 15px;
}

.status {
    font-size: 24px;
    font-weight: bold;
}    

    
</style>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倫太郎</title>
</head>
<body>
  <img src="002.png" class="banner">
  <h1>倫太郎のページ</h1>

  <h2>現在のポイント</h2>

<p id="brotherPoint" display: block;>読み込み中...</p>

<h2>今日のチャレンジ</h2>

<div class="task-row">
  <button class="big-button" onclick="sendAction('daily')">
    デイリーボーナス
  </button>
  <span id="dailyStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('tsubaki')">
    つばきのお世話
  </button>
  <span id="tsubakiStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('mealprep')">
    食事の準備
  </button>
  <span id="mealPrepStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('cooking')">
    食事作り
  </button>
  <span id="cookingStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('bath')">
    お風呂洗い
  </button>
  <span id="bathStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('trash')">
    ごみ捨て
  </button>
  <span id="trashStatus" class="status">読み込み中...</span>
</div>

<div class="task-row">
  <button class="big-button" onclick="sendAction('laundry')">
    洗濯のお手伝い
  </button>
  <span id="laundryStatus" class="status">読み込み中...</span>
</div>

  <script>

fetch("https://script.google.com/macros/s/AKfycbwgclJzs9GK1WDBdc_-r3MofJBGaHOe9G_51f9AP3jgbjiY_EnlZnPNAZ017IfRwiv4Rw/exec")

.then(response => response.json())

.then(data => {

  document.getElementById("brotherPoint").textContent =
    "倫太郎： " + data.brother + " pt";

  document.getElementById("dailyStatus").textContent =
    data.dailyStatus;

document.getElementById("tsubakiStatus").textContent =
    data.tsubakiStatus;

document.getElementById("mealPrepStatus").textContent =
    data.mealPrepStatus;

document.getElementById("cookingStatus").textContent =
    data.cookingStatus;

document.getElementById("bathStatus").textContent =
    data.bathStatus;

document.getElementById("trashStatus").textContent =
    data.trashStatus;

document.getElementById("laundryStatus").textContent =
    data.laundryStatus;


  
});

function sendAction(actionName) {

  fetch(
    "https://script.google.com/macros/s/AKfycbwgclJzs9GK1WDBdc_-r3MofJBGaHOe9G_51f9AP3jgbjiY_EnlZnPNAZ017IfRwiv4Rw/exec",
    {
      method: "POST",
      body: new URLSearchParams({
        action: actionName
      })
    }
  )
  .then(response => response.text())
  .then(data => {
    alert("記録しました！");
  });

}
    
</script>
  
</body>
</html>
