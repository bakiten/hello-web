<!DOCTYPE html>
<html>
  <style>
.banner {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;

}

}

    text-align: center;

<head>

<body>

<h1 id="brotherPoint">読み込み中...</h1>

  <script>

fetch("https://script.google.com/macros/s/AKfycbwgclJzs9GK1WDBdc_-r3MofJBGaHOe9G_51f9AP3jgbjiY_EnlZnPNAZ017IfRwiv4Rw/exec")
