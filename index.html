<!DOCTYPE html>
<html>
  <style>
.banner {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
}
    
h1 {
    text-align: center;
}

h2 {
    text-align: center;
}

.big-button {
    width: 80%;
    max-width: 400px;
    font-size: 28px;
    font-weight: bold;
    padding: 20px;
    margin: 10px;
    border-radius: 12px;
    display: block;
}

<head>
